name: 🚀 Build SpeedTest APK

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout source code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK 17
      - name: ☕ Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      # 3. Cache Gradle dependencies
      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Make Gradle wrapper executable
      - name: 🔐 Make gradlew executable
        run: chmod +x gradlew

      # 5. Validate Gradle wrapper
      - name: ✅ Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # 6. Install Android SDK components
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      # 7. Show build info
      - name: ℹ️ Build information
        run: |
          echo "=========================================="
          echo "  SpeedTest APK Build"
          echo "=========================================="
          echo "  Branch:     ${{ github.ref_name }}"
          echo "  Commit:     ${{ github.sha }}"
          echo "  Build Type: ${{ github.event.inputs.build_type || 'release' }}"
          echo "  Runner OS:  ${{ runner.os }}"
          echo "=========================================="
          java -version
          ./gradlew --version

      # 8a. Build Release APK
      - name: 🏗️ Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '' }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.useAndroidX=true

      # 8b. Build Debug APK
      - name: 🐛 Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace

      # 9. Run unit tests
      - name: 🧪 Run unit tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      # 10. Upload test results
      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/build/reports/tests/'
          retention-days: 14

      # 11. Find APK files
      - name: 🔍 Find generated APK files
        run: |
          echo "Generated APK files:"
          find . -name "*.apk" -not -path "*/intermediates/*" | head -20
          echo ""
          echo "APK sizes:"
          find . -name "*.apk" -not -path "*/intermediates/*" -exec du -sh {} \;

      # 12. Upload Release APK artifact
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == '' }}
        with:
          name: SpeedTest-Release-APK-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      # 13. Upload Debug APK artifact
      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.build_type == 'debug' }}
        with:
          name: SpeedTest-Debug-APK-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      # 14. Build Summary
      - name: 📋 Build Summary
        run: |
          APK_PATH=$(find . -name "*.apk" -not -path "*/intermediates/*" | head -1)
          if [ -n "$APK_PATH" ]; then
            APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
            APK_NAME=$(basename "$APK_PATH")
            echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 📦 APK Name | \`$APK_NAME\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 📏 APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| 🔖 Build Number | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
            echo "| 📝 Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| 🌿 Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
            echo "Download the APK from the **Artifacts** section below ⬇️" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────
  # Create GitHub Release on tag push
  release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}

      - name: 🔐 Make gradlew executable
        run: chmod +x gradlew

      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "SpeedTest ${{ github.ref_name }}"
          body: |
            ## 🚀 SpeedTest ${{ github.ref_name }}

            ### Features:
            - ⚡ Real internet speed measurement (Download & Upload)
            - 📡 Ping & Jitter testing
            - 🎨 Custom animated speedometer gauge
            - 🌐 ISP & Server detection via Cloudflare
            - 📊 Connection rating system

            ### 📥 Installation:
            1. Download the APK below
            2. Enable "Install from unknown sources" in Android Settings
            3. Open the APK file and install

            ### Requirements: Android 7.0+ (API 24)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
